name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          package_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          if [ "$GITHUB_REF_NAME" != "v$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v$package_version" >&2
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Generate oclif manifest
        run: npx oclif manifest

      - name: Test
        run: npm test

  pack:
    name: Pack Tarballs
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install 7-zip (needed for Windows tarball)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarballs
        run: npx oclif pack tarballs

      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: tarballs
          path: dist/*.tar.gz

  release:
    name: GitHub Release
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          name: tarballs
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
